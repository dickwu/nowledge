# Dependency policy for the complete feature graph. Keep this list narrow: each
# allowed license is present in the current Cargo.lock graph, and no crate- or
# advisory-specific exception is accepted silently.

[graph]
all-features = true

[advisories]
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste 1.0.15 is transitively required by turbovec 0.9 through faer/gemm; RustSec lists no safe upgrade, so remove this exception when turbovec drops paste" },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = false
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
